<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lume</title>
    <link rel="stylesheet" href="src/style/style.css" />
    <script src="src/script/script.js" defer></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <main>
      <form class="search">
        <i class="fa-solid fa-location-dot"></i>
        <input
          type="search"
          name="city_name"
          id="city_name"
          placeholder="Digite o nome da cidade"
          aria-label="Buscar cidade"
        />
        <button type="submit">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </form>
      <section id="weather" class="show">
        <h1 class="title">São Joaquim da Barra, SP</h1>
        <div class="infos">
          <div class="temp">
            <img
              src="http://openweathermap.org/img/wn/04d@2x.png"
              alt="Imagem do clima"
              class="temp_img"
            />
            <div class="details">
              <p class="temp_value">29 &deg;C</p>
              <p class="temp_description">Nublado</p>
            </div>
          </div>
        </div>
        <div class="other_infos">
            <div class="info">
                <i class="fa-solid fa-temperature-high temp_max_icon"></i>
                <div>
                    <h2>Temp. Max.</h2>
                    <p class="temp_max">29 &deg;C</p>
                </div>
            </div>

            <div class="info">
                <i class="fa-solid fa-temperature-low temp_min_icon"></i>
                <div>
                    <h2>Temp. Min.</h2>
                    <p class="temp_min">22 &deg;C</p>
                </div>
            </div>

            <div class="info">
                <i class="fa-solid fa-droplet humidity_icon"></i>
                <div>
                    <h2>Humidade</h2>
                    <p class="humidity">60%</p>
                </div>
            </div>

            <div class="info">
                <i class="fa-solid fa-wind wind_icon"></i>
                <div>
                    <h2>Vento</h2>
                    <p class="wind">50Km/h</p>
                </div>
            </div>

        </div>
      </section>
      <section class="alert"></section>
    </main>
  </body>
</html>
